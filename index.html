<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栃木市移動サポート</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->
<!-- 上部メニュー -->
<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->
<nav class="menu">
  <button class="menu-button" onclick="showSection('home')">🏠</button>
  <button class="menu-button" onclick="showSection('bus')">🚌</button>
  <button class="menu-button" onclick="showSection('routeMap')">🗺️</button>
  <button class="menu-button" onclick="showSection('kurataku')">🚕</button>
  <button class="menu-button" onclick="showSection('places')">📍</button>
</nav>

<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->
<!-- トップ画面 -->
<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->
<section id="home" class="content-section active home-section">

  <!-- とち介 -->
  <div class="hero-card">

    <div class="hero-text">
      <p class="hero-label">栃木市の移動サポート</p>
      <h2 class="hero-title">とち介ナビ</h2>
      <p class="hero-desc">
        バス・蔵タク・地図をすぐ確認できます
      </p>
    </div>

    <div class="hero-img">
      <img src="tochisuke.jpg" alt="とち介">
    </div>

  </div>

  <!-- メインカード -->
  <div class="main-grid">

    <button class="main-card bus" onclick="showSection('bus')">
      <div class="icon">
        <img src="icons/bus.png">
      </div>
      <div class="title">バス時刻表</div>
      <div class="desc">次のバスを確認</div>
    </button>

    <button class="main-card taxi" onclick="showSection('kurataku')">
      <div class="icon">
        <img src="icons/taxi.png">
      </div>
      <div class="title">蔵タク</div>
      <div class="desc">予約・電話</div>
    </button>

    <button class="main-card map" onclick="showSection('routeMap')">
      <div class="icon">
        <img src="icons/map.png">
      </div>
      <div class="title">路線図</div>
      <div class="desc">全体を確認</div>
    </button>

    <button class="main-card place" onclick="showSection('places')">
      <div class="icon">
        <img src="icons/place.png">
      </div>
      <div class="title">よく使う場所</div>
      <div class="desc">地図を開く</div>
    </button>

  </div>

</section>

<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->
<!-- バス -->
<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->
<section id="bus" class="content-section">
  <h2>バス時刻表</h2>

  <div class="card">
    <h3>停留所を選択</h3>
    <input id="stop-search" class="stop-search" type="text"
      placeholder="停留所名で検索"
      oninput="renderStopButtons()">

    <div id="stop-buttons" class="stop-buttons"></div>
  </div>

  <div id="timetable-area" class="card"></div>
</section>

<!-- 路線図 -->
<section id="routeMap" class="content-section">
  <h2>路線図</h2>
  <img src="route_map.png" class="route-map-image">
</section>

<!-- 蔵タク -->
<section id="kurataku" class="content-section">
  <h2>蔵タク</h2>
  <a href="tel:0282211234" class="link-button">電話する</a>
</section>

<!-- よく使う場所 -->
<section id="places" class="content-section">
  <h2>よく使う場所</h2>
  <a href="https://www.google.com/maps?q=栃木駅" target="_blank" class="link-button">栃木駅</a>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
