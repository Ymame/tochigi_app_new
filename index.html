<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->
<!-- 【中央】メイン機能カード（アイコン画像版） -->
<!--■■■■■■■■■■■■■■■■■■■■■■■■■■■■-->

<div class="main-grid">

  <!--==============================-->
  <!-- 【バス】 -->
  <!--==============================-->
  <button class="main-card bus" onclick="showSection('bus')">

    <!-- アイコン -->
    <div class="icon">
      <img src="icons/bus.png" alt="バス">
    </div>

    <!-- タイトル -->
    <div class="title">バス時刻表</div>

    <!-- 説明 -->
    <div class="desc">次のバスを確認</div>

  </button>


  <!--==============================-->
  <!-- 【蔵タク】 -->
  <!--==============================-->
  <button class="main-card taxi" onclick="showSection('kurataku')">

    <div class="icon">
      <img src="icons/taxi.png" alt="タクシー">
    </div>

    <div class="title">蔵タク</div>

    <div class="desc">予約・電話</div>

  </button>


  <!--==============================-->
  <!-- 【路線図】 -->
  <!--==============================-->
  <button class="main-card map" onclick="showSection('routeMap')">

    <div class="icon">
      <img src="icons/map.png" alt="路線図">
    </div>

    <div class="title">路線図</div>

    <div class="desc">全体を確認</div>

  </button>


  <!--==============================-->
  <!-- 【よく使う場所】 -->
  <!--==============================-->
  <button class="main-card place" onclick="showSection('places')">

    <div class="icon">
      <img src="icons/place.png" alt="場所">
    </div>

    <div class="title">よく使う場所</div>

    <div class="desc">地図を開く</div>

  </button>

</div>
